<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Service Application Card</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <button class="theme-button" id="themeButton" type="button">
      Dark Mode
    </button>

    <main class="page-container">
      <section class="service-card">
        <img
          class="service-card__image"
          src="https://images.unsplash.com/photo-1460925895917-afdab827c52f"
          alt="Laptop displaying website development work"
        />

        <div class="service-card__content">
          <h2 class="service-card__title">Website Development</h2>

          <p class="service-card__description">
            We create responsive, fast, and user-friendly websites for
            businesses.
          </p>

          <button class="service-card__button" id="applyButton" type="button">
            Apply
          </button>
        </div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
